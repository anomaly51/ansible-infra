---
- name: Update apt cache and install nfs-common
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: yes
  become: true
  tags:
    - k3s_prer

- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /opt/k3s-install.sh
    mode: '0755'
  tags:
    - k3s_prer

- name: Pre-download K3s binaries
  ansible.builtin.shell: /opt/k3s-install.sh
  environment:
    INSTALL_K3S_SKIP_START: "true"
    INSTALL_K3S_SKIP_ENABLE: "true"
  tags:
    - k3s_prer
