---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - zsh
      - git
      - curl
      - sudo
    state: present
    update_cache: yes

- name: Change default shell for user
  ansible.builtin.user:
    name: "{{ zsh_user }}"
    shell: /bin/zsh

- name: Clone Oh My Zsh repository
  become: yes
  become_user: "{{ zsh_user }}"
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "/home/{{ zsh_user }}/.oh-my-zsh"
    depth: 1

- name: Create custom .zshrc
  become: yes
  become_user: "{{ zsh_user }}"
  ansible.builtin.copy:
    dest: "/home/{{ zsh_user }}/.zshrc"
    mode: '0644'
    content: |
      export ZSH="$HOME/.oh-my-zsh"
      ZSH_THEME="fino-time"
      plugins=(git sudo docker)
      source $ZSH/oh-my-zsh.sh

- name: Truncate machine-id to force regeneration on boot
  become: yes
  ansible.builtin.copy:
    dest: /etc/machine-id
    content: ""
